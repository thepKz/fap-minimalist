<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAP Minimal Skin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1 class="popup-title">FAP Minimal Skin</h1>
      <p class="popup-desc">Giao diện tối giản cho fap.fpt.edu.vn</p>
      <label class="toggle">
        <input type="checkbox" id="skin-toggle" />
        <span class="toggle-label">Bật theme</span>
      </label>
      <p id="status" class="status" hidden></p>
      <nav class="popup-links" aria-label="Liên kết">
        <a
          class="popup-link"
          href="https://github.com/thepKz/fap-minimalist"
          target="_blank"
          rel="noopener noreferrer"
          >Tặng 1 sao</a
        >
        <span class="popup-links-sep" aria-hidden="true">·</span>
        <a
          class="popup-link"
          href="https://www.facebook.com/thepp.tan/"
          target="_blank"
          rel="noopener noreferrer"
          >Báo lỗi</a
        >
      </nav>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
